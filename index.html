<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#EF6B01" />
    <!-- Content Security Policy: tightened, allows Supabase, Lovable AI gateway, YouTube, Instagram embeds, Google fonts -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.instagram.com https://www.youtube.com https://*.ytimg.com https://platform.instagram.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://ai.gateway.lovable.dev https://api.instagram.com https://*.sentry.io; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://www.instagram.com https://platform.instagram.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link id="seasonal-favicon" rel="icon" type="image/png" href="/favicon-spring.png" />
    <title>TLC Calisthenics</title>
    <script>
      // Seasonal favicon — rotates by current season
      (function() {
        var m = new Date().getMonth();
        var seasons = { spring: '/favicon-spring.png', summer: '/favicon-summer.png', autumn: '/favicon-autumn.png', winter: '/favicon-winter.png' };
        var labels = { spring: '🌸 Japan', summer: '☀️ Greece', autumn: '🍂 Switzerland', winter: '❄️ Norway' };
        var s = m >= 2 && m <= 4 ? 'spring' : m >= 5 && m <= 7 ? 'summer' : m >= 8 && m <= 10 ? 'autumn' : 'winter';
        document.getElementById('seasonal-favicon').href = seasons[s];
        document.title = 'TLC Calisthenics ' + labels[s];
      })();
    </script>
    <meta name="description" content="Master bodyweight skills with TLC Calisthenics — track progress, follow structured programs, and level up." />
    <meta name="author" content="TLC" />

    <meta property="og:title" content="TLC Calisthenics" />
    <meta property="og:description" content="Master bodyweight skills with TLC Calisthenics" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
